    <script>
        $(function () {
            // 1. 拔除 Bootstrap 原生的 data-toggle
            $('.DRXnavbar .nav-item.dropdown > a').removeAttr('data-toggle');

            // 2. 點擊控制
            $('.DRXnavbar .nav-item.dropdown > a').on('click', function (e) {

                if ($(window).width() <= 767) {
                    e.preventDefault();

                    var $parent = $(this).parent('.dropdown');
                    var isAlreadyOpen = $parent.hasClass('show');

                    $('.DRXnavbar .dropdown').removeClass('show');

                    if (!isAlreadyOpen) {
                        $parent.addClass('show');
                    }
                }
            });

            // 3. 滾動自動收起
            $(window).on('scroll', function () {

                if ($(window).width() <= 767) {

                    var scrollTop = $(this).scrollTop();
                    var triggerHeight = $(window).height() / 3;

                    if (scrollTop > triggerHeight) {
                        $('.DRXnavbar .dropdown').removeClass('show');
                    }
                }
            });
        });
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault(); // 關鍵：阻止網址跳轉與閃爍

                const targetId = this.getAttribute('href');
                // 排除掉只有 "#" 的空連結
                if (targetId === "#") return;

                const targetElement = document.querySelector(targetId);

                if (targetElement) {
                    // 計算目標位置，-80 是預留上方選單的高度，可自行調整
                    const offsetTop = targetElement.getBoundingClientRect().top + window.pageYOffset - 80;

                    window.scrollTo({
                        top: offsetTop,
                        behavior: 'smooth'
                    });
                }
            });
        });
    </script>
