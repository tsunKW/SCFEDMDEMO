                el: '.SecSwiper .swiper-pagination',
                clickable: true, //觸擊切換
            },
            //★5.2.1★左右切換-白色箭頭swiper-button-white, 黑色箭頭swiper-button-black  
            navigation: {
                nextEl: '.SecSwiper .swiper-button-next',
                prevEl: '.SecSwiper .swiper-button-prev',
            },
            //★5.2.1★自動撥放
            autoplay: {
                delay: 5000,
                disableOnInteraction: false, //觸擊後不再自動輪播
            },
            //★5.2.1★切換特效(淡化)
            effect: 'coverflow', //切換特效 fade(淡化) cube(立方體) coverflow(3D) flip(翻牌) slide(一般)
            fadeEffect: {
                crossFade: true //打開自動淡出
            },
            //排版
            slidesPerView: 1, //顯示幾個
            slidesPerGroup: 1, //一次切換幾個
            spaceBetween: 0, //間距
            loop: true,
        });
    </script>
    <script>
        $(function () {
            // 1. 拔除 Bootstrap 原生的 data-toggle
            $('.SCFnavbar .nav-item.dropdown > a').removeAttr('data-toggle');

            // 2. 點擊控制
            $('.SCFnavbar .nav-item.dropdown > a').on('click', function (e) {

                if ($(window).width() <= 767) {
                    e.preventDefault();

                    var $parent = $(this).parent('.dropdown');
                    var isAlreadyOpen = $parent.hasClass('show');

                    $('.SCFnavbar .dropdown').removeClass('show');

                    if (!isAlreadyOpen) {
                        $parent.addClass('show');
                    }
                }
            });

            // 3. 滾動自動收起
            $(window).on('scroll', function () {

                if ($(window).width() <= 767) {

                    var scrollTop = $(this).scrollTop();
                    var triggerHeight = $(window).height() / 3;

                    if (scrollTop > triggerHeight) {
                        $('.SCFnavbar .dropdown').removeClass('show');
                    }
                }
            });
        });
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault(); // 關鍵：阻止網址跳轉與閃爍

                const targetId = this.getAttribute('href');
                // 排除掉只有 "#" 的空連結
                if (targetId === "#") return;

                const targetElement = document.querySelector(targetId);

                if (targetElement) {
                    // 計算目標位置，-80 是預留上方選單的高度，可自行調整
                    const offsetTop = targetElement.getBoundingClientRect().top + window.pageYOffset - 80;

                    window.scrollTo({
                        top: offsetTop,
                        behavior: 'smooth'
                    });
                }
            });
        });
        // 確保 API 準備就緒
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        let player;
        function onYouTubeIframeAPIReady() {
            // 綁定 iframe ID
            player = new YT.Player('myVideo');
        }

        // 使用 Intersection Observer 偵測滑動
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                // 如果影片不在畫面中 (isIntersecting 為 false)
                if (!entry.isIntersecting) {
                    if (player && player.pauseVideo) {
                        player.pauseVideo(); // 執行暫停
                    }
                } else {
                    // 如果你希望滑回來自動播放，可以解開下方註釋
                    // if (player && player.playVideo) player.playVideo();
                }
            });
        }, {
            threshold: 0.2 // 影片剩下 20% 在畫面上時觸發，可依需求調整
        });

        // 開始觀察
        window.addEventListener('load', () => {
            const videoIframe = document.getElementById('myVideo');
            if (videoIframe) observer.observe(videoIframe);
        });
    </script>
